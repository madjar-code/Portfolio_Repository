{% extends "frontend/base.html" %}
{% load static %}

{% block title %}Add a project{% endblock %}

{% block content %}
  <p><a href="{% url 'index' %}">&larr; Back to projects</a></p>
  <h1>Add a project</h1>

  <form id="create-form" class="auth-form">
    <label>
      <span>Name</span>
      <input name="name" required />
    </label>
    <label>
      <span>Description</span>
      <textarea name="description" rows="3" required></textarea>
    </label>
    <label>
      <span>Technologies</span>
      <input name="technologies" placeholder="Django, Postgres" required />
    </label>
    <label>
      <span>Start date</span>
      <input name="start_date" type="date" required />
    </label>
    <label>
      <span>End date (optional)</span>
      <input name="end_date" type="date" />
    </label>
    <button type="submit" class="btn-primary">Create</button>
    <div id="create-error" class="error-banner" hidden></div>
  </form>
{% endblock %}

{% block scripts %}
  <script src="{% static 'frontend/js/projects.js' %}"></script>
{% endblock %}
