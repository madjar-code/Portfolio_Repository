services:
  web:
    build:
      context: .
      dockerfile: docker/django.Dockerfile
      args:
        REQUIREMENTS: dev.txt
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: portfolio.settings.dev
      DJANGO_SECRET_KEY: dev-only-not-secret
    volumes:
      - ./project:/app
    ports:
      - "8000:8000"
